name: Release

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      dist_tag:
        description: "npm dist-tag"
        type: choice
        required: true
        default: next
        options:
          - next
          - latest
      dry_run:
        description: "Run all gates but skip npm publish"
        type: boolean
        required: true
        default: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release checks
        run: bun run release:check

      - name: Resolve release mode
        id: release_mode
        env:
          INPUT_DIST_TAG: ${{ github.event.inputs.dist_tag }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          dist_tag="${INPUT_DIST_TAG:-next}"
          dry_run="${INPUT_DRY_RUN:-false}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
              dist_tag="next"
            else
              dist_tag="latest"
            fi
            dry_run="false"
          fi

          echo "dist_tag=${dist_tag}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"

      - name: Dry-run publish
        if: steps.release_mode.outputs.dry_run == 'true'
        run: npm publish --dry-run --tag "${{ steps.release_mode.outputs.dist_tag }}"

      - name: Dry-run publish to JSR
        if: steps.release_mode.outputs.dry_run == 'true'
        run: npx jsr publish --dry-run

      - name: Publish to npm
        if: steps.release_mode.outputs.dry_run != 'true'
        run: npm publish --tag "${{ steps.release_mode.outputs.dist_tag }}"

      - name: Publish to JSR
        if: steps.release_mode.outputs.dry_run != 'true'
        run: npx jsr publish

      - name: Pack release artifact
        if: steps.release_mode.outputs.dry_run != 'true'
        run: npm pack

      - name: Create GitHub release
        if: steps.release_mode.outputs.dry_run != 'true' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: "*.tgz"
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
